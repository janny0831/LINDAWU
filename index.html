<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大量(管理部)保管品管理系統 - 同步優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .sticky-col { position: sticky; right: 0; background-color: white; z-index: 10; box-shadow: -4px 0 6px -2px rgba(0, 0, 0, 0.05); }
        .sticky-header { position: sticky; top: 0; background-color: #f1f5f9; z-index: 20; }
        .sticky-col-header { position: sticky; right: 0; top: 0; background-color: #f1f5f9; z-index: 30; }
        tr:hover .sticky-col { background-color: #f0f7ff; }
        .highlight-row { animation: highlight-pulse 2.5s ease-out; }
        @keyframes highlight-pulse { 0% { background-color: #fef08a; } 80% { background-color: #fef08a; } 100% { background-color: transparent; } }
        
        /* 進度條平滑動畫 */
        #globalProgressBar { transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1); }
        .loading-overlay { cursor: wait !important; pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div id="globalProgressContainer" class="hidden fixed top-0 left-0 w-full z-[100] transition-opacity duration-300">
        <div class="h-1.5 w-full bg-slate-200 overflow-hidden">
            <div id="globalProgressBar" class="h-full bg-blue-600 shadow-[0_0_10px_rgba(37,99,235,0.6)]" style="width: 0%"></div>
        </div>
        <div class="bg-white/95 backdrop-blur-md px-4 py-2.5 text-[12px] font-bold text-blue-700 flex justify-between items-center shadow-lg border-b border-blue-100">
            <span class="flex items-center gap-2">
                <svg class="animate-spin h-4 w-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span id="globalProgressText">正在與 Firebase 進行即時同步...</span>
            </span>
            <span id="globalProgressPercent" class="font-mono bg-blue-50 px-2 py-0.5 rounded">0%</span>
        </div>
    </div>

    <div id="appBody" class="max-w-[98vw] mx-auto p-4 transition-all duration-300">
        <header class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    大量科技(管理部)保管品管理系統
                </h1>
                <p class="text-sm text-slate-500 mt-1">Firebase 雲端同步版本 | 已實作進度精確鎖定功能</p>
            </div>
            
            <div class="flex flex-wrap justify-center gap-3">
                <input type="file" id="fileUpload" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="fileUpload" class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded-lg transition flex items-center gap-2 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    匯入 Excel
                </label>
                <button onclick="openAddModal()" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium py-2.5 px-4 rounded-lg transition flex items-center gap-2 shadow-sm">
                    新增項目
                </button>
                <button id="exportBtn" onclick="exportToExcel()" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 px-6 rounded-lg transition flex items-center gap-2 shadow-sm hidden">
                    匯出備份
                </button>
            </div>
        </header>

        <div id="mainContent" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-200 mb-4 gap-4">
                <div class="flex">
                    <button onclick="switchTab('page1')" id="tab-page1" class="py-3 px-6 text-sm font-bold border-b-2 border-blue-600 text-blue-600">資料清單</button>
                    <button onclick="switchTab('page2')" id="tab-page2" class="py-3 px-6 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700">異動日誌</button>
                </div>
                <div id="searchContainer" class="w-full md:w-80 pb-2 md:pb-0">
                    <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="搜尋品名、單號、保管人..." class="w-full px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none transition shadow-sm">
                </div>
            </div>

            <div id="page1" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto max-h-[75vh]">
                    <table class="w-full text-sm text-left whitespace-nowrap">
                        <thead id="tableHead" class="sticky-header"></thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
                <div id="tableFooter" class="p-4 bg-slate-50 border-t border-slate-200 text-slate-500 text-sm font-medium"></div>
            </div>

            <div id="page2" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto max-h-[75vh]">
                    <table class="w-full text-sm text-left whitespace-nowrap">
                        <thead id="logTableHead" class="sticky-header text-slate-600"></thead>
                        <tbody id="logBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="emptyState" class="flex flex-col items-center justify-center p-24 bg-white rounded-xl shadow-sm border border-slate-200 text-center">
            <h3 class="text-xl font-bold text-slate-900 mb-2">雲端資料庫連線中...</h3>
            <p class="text-slate-500">若長時間無反應，請確認網路連線是否正常。</p>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl flex flex-col max-h-[95vh]">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-slate-800">資料編輯</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full transition text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <div class="p-8 overflow-y-auto flex-1">
                <form id="editForm" onsubmit="handleFormSubmit(event)">
                    <div id="editFormFields" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-6"></div>
                </form>
            </div>
            <div class="p-6 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
                <button onclick="closeModal()" class="px-6 py-2.5 border border-slate-300 rounded-xl text-slate-700 bg-white hover:bg-slate-50 transition font-bold">取消</button>
                <button type="submit" form="editForm" class="px-10 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition font-bold shadow-md">儲存並更新</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
            <h3 class="text-2xl font-bold text-slate-900 mb-2">確認刪除項目？</h3>
            <p id="confirmText" class="text-slate-500 mb-8"></p>
            <div class="flex gap-4">
                <button onclick="closeConfirm()" class="flex-1 px-4 py-3 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition font-bold">取消</button>
                <button id="confirmBtn" class="flex-1 px-4 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition font-bold shadow-lg">確認移除</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrHB-_fcAeScIJe_gWeGn18JKnq8TUz9k",
            authDomain: "lindawu-67049.firebaseapp.com",
            projectId: "lindawu-67049",
            storageBucket: "lindawu-67049.firebasestorage.app",
            messagingSenderId: "910844253914",
            appId: "1:910844253914:web:969f2c11a173b8e4f0b7e3",
            measurementId: "G-REYKXP80NX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const dbDocRef = doc(db, "storageApp", "mainData");

        const STANDARD_HEADERS = [
            "是否盤點", "日期", "保管單號碼", "保管品號碼", "品名", "廠牌", "規格", "型式", 
            "取得成本", "保管人", "部門", "存放地點", "備註", 
            "固資轉列管取得日期", "處理結果", "轉出部門", "轉入部門", "取得日期"
        ];
        const DATE_FIELDS = ["日期", "固資轉列管取得日期", "取得日期"];

        const appState = { data: [], logs: [], editUid: null, isNew: false };
        window.currentSearchTerm = '';

        // --- 強化的同步進度條控制邏輯 ---
        let progressInterval;
        let currentProgress = 0;

        function startProgress(text) {
            const container = document.getElementById('globalProgressContainer');
            const bar = document.getElementById('globalProgressBar');
            const txt = document.getElementById('globalProgressText');
            const pct = document.getElementById('globalProgressPercent');
            const body = document.getElementById('appBody');
            
            container.classList.remove('hidden', 'opacity-0');
            body.classList.add('loading-overlay'); // 鎖定 UI 防止連點
            txt.innerText = text;
            currentProgress = 0;
            
            clearInterval(progressInterval);
            // 第一階段：快速衝到 30%
            currentProgress = 30;
            bar.style.width = currentProgress + '%';
            pct.innerText = currentProgress + '%';

            // 第二階段：極慢爬行（模擬正在處理大檔案），每秒只增加 1%~2%，最高到 95%
            progressInterval = setInterval(() => {
                if (currentProgress < 95) {
                    currentProgress += 1;
                    bar.style.width = currentProgress + '%';
                    pct.innerText = currentProgress + '%';
                }
            }, 800); 
        }

        function endProgress() {
            const container = document.getElementById('globalProgressContainer');
            const bar = document.getElementById('globalProgressBar');
            const pct = document.getElementById('globalProgressPercent');
            const body = document.getElementById('appBody');
            
            clearInterval(progressInterval);
            
            // 第三階段：接收到 Firebase 成功訊號，強制衝到 100%
            currentProgress = 100;
            bar.style.width = '100%';
            pct.innerText = '100%';
            
            // 延遲消失，讓使用者看到完成狀態
            setTimeout(() => {
                container.classList.add('opacity-0');
                body.classList.remove('loading-overlay');
                setTimeout(() => {
                    container.classList.add('hidden');
                    bar.style.width = '0%';
                }, 300);
            }, 800);
        }

        // --- Firebase 核心同步區 ---

        // 寫入資料：確保 endProgress 鎖在 .then() 裡面
        function saveToFirebase() {
            startProgress("正在上傳資料至雲端控制台，請稍候..."); 
            setDoc(dbDocRef, {
                data: appState.data,
                logs: appState.logs
            }).then(() => {
                // 只有 Firebase 伺服器回傳成功，才會呼叫 endProgress
                endProgress();
            }).catch(error => {
                console.error("Firebase 寫入失敗:", error);
                alert("寫入失敗，請檢查網路！");
                endProgress();
            });
        }

        // 讀取資料
        let isFirstTime = true;
        onSnapshot(dbDocRef, (docSnap) => {
            if (isFirstTime) startProgress("正在讀取雲端最新資料庫...");

            if (docSnap.exists()) {
                const cloudData = docSnap.data();
                appState.data = cloudData.data || [];
                appState.logs = cloudData.logs || [];
                
                if (appState.data.length > 0) {
                    initSystemView();
                } else {
                    document.getElementById('mainContent').classList.add('hidden');
                    document.getElementById('emptyState').classList.remove('hidden');
                }
                
                if (!document.getElementById('mainContent').classList.contains('hidden')) {
                    renderTable();
                    renderLogs();
                }
            }

            if (isFirstTime) {
                // 等待畫面渲染完成後結束進度條
                setTimeout(endProgress, 500);
                isFirstTime = false;
            }
        });

        // --- 其餘原有功能維持不變 ---
        const escapeHTML = (str) => {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        };

        function parseExcelDate(val) {
            if (!val) return "";
            if (!isNaN(val) && parseFloat(val) > 10000) {
                const date = new Date(Math.round((parseFloat(val) - 25569) * 86400 * 1000));
                const y = date.getUTCFullYear(), m = String(date.getUTCMonth() + 1).padStart(2, '0'), d = String(date.getUTCDate()).padStart(2, '0');
                return `${y}/${m}/${d}`;
            }
            const s = String(val).trim();
            if (/^\d{4}[-/]\d{1,2}[-/]\d{1,2}$/.test(s)) return s.replace(/-/g, '/');
            return s;
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            startProgress("正在處理 Excel 大量數據...");
            const reader = new FileReader();
            reader.onload = function(evt) {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                
                appState.data = rawRows.map((rawRow, idx) => {
                    const row = { _uid: 'uid_' + Date.now() + '_' + idx };
                    STANDARD_HEADERS.forEach(h => {
                        let val = rawRow[h] || "";
                        if (DATE_FIELDS.includes(h)) val = parseExcelDate(val);
                        row[h] = String(val).trim();
                    });
                    return row;
                });
                saveToFirebase();
                initSystemView();
            };
            reader.readAsArrayBuffer(file);
            e.target.value = '';
        }

        function initSystemView() {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('exportBtn').classList.remove('hidden');
        }

        function handleSearch(val) { window.currentSearchTerm = val.trim(); renderTable(); }

        function renderTable() {
            const thead = document.getElementById('tableHead'), tbody = document.getElementById('tableBody');
            thead.innerHTML = `<tr class="bg-slate-50 text-slate-600 text-xs uppercase font-bold">` + 
                STANDARD_HEADERS.map(h => `<th class="px-4 py-4 border-b">${h}</th>`).join('') + 
                `<th class="sticky-col-header px-4 py-4 border-b text-center w-28">操作</th></tr>`;

            const displayData = window.currentSearchTerm ? appState.data.filter(row => STANDARD_HEADERS.some(h => String(row[h]||'').toLowerCase().includes(window.currentSearchTerm.toLowerCase()))) : appState.data;
            
            tbody.innerHTML = displayData.map(row => {
                return `<tr id="row-${row._uid}" class="hover:bg-blue-50/40">` + 
                    STANDARD_HEADERS.map(h => `<td class="px-4 py-3 border-b truncate max-w-[200px]">${h==='是否盤點' && row[h]==='Y' ? `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px] font-black">Y</span>` : escapeHTML(row[h])}</td>`).join('') + 
                    `<td class="sticky-col px-4 py-3 border-b text-center"><button onclick="openEditModal('${row._uid}')" class="text-blue-600 font-bold text-xs">編輯</button></td></tr>`;
            }).join('');
            document.getElementById('tableFooter').innerHTML = `目前顯示: ${displayData.length} 筆資料`;
        }

        function switchTab(id) {
            document.getElementById('page1').classList.toggle('hidden', id !== 'page1');
            document.getElementById('page2').classList.toggle('hidden', id !== 'page2');
            document.getElementById('tab-page1').className = id === 'page1' ? "py-3 px-6 text-sm font-bold border-b-2 border-blue-600 text-blue-600" : "py-3 px-6 text-sm font-bold border-b-2 border-transparent text-slate-500";
            document.getElementById('tab-page2').className = id === 'page2' ? "py-3 px-6 text-sm font-bold border-b-2 border-blue-600 text-blue-600" : "py-3 px-6 text-sm font-bold border-b-2 border-transparent text-slate-500";
        }

        function openAddModal() { appState.isNew = true; appState.editUid = 'new_'+Date.now(); renderForm({}); document.getElementById('editModal').classList.remove('hidden'); }
        function openEditModal(uid) { appState.isNew = false; appState.editUid = uid; renderForm(appState.data.find(d=>d._uid===uid)); document.getElementById('editModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

        function renderForm(data) {
            document.getElementById('editFormFields').innerHTML = STANDARD_HEADERS.map((h, i) => `
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">${i+1}. ${h}</label>
                    <input type="${DATE_FIELDS.includes(h)?'date':'text'}" name="${h}" value="${(data[h]||'').replace(/\//g,'-')}" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl">
                </div>
            `).join('');
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target), newValues = { _uid: appState.editUid };
            STANDARD_HEADERS.forEach(h => { let v = formData.get(h); if(v && DATE_FIELDS.includes(h)) v = v.replace(/-/g,'/'); newValues[h] = v || ""; });
            
            if (appState.isNew) appState.data.push(newValues);
            else { const idx = appState.data.findIndex(d => d._uid === appState.editUid); appState.data[idx] = newValues; }
            
            saveToFirebase();
            closeModal();
        }

        function exportToExcel() {
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(appState.data.map(({_uid, ...r})=>r)), "保管品清單");
            XLSX.writeFile(wb, `大量科技保管品_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        // 全域掛載
        window.handleFileUpload = handleFileUpload;
        window.handleSearch = handleSearch;
        window.switchTab = switchTab;
        window.openAddModal = openAddModal;
        window.openEditModal = openEditModal;
        window.closeModal = closeModal;
        window.handleFormSubmit = handleFormSubmit;
        window.exportToExcel = exportToExcel;
    </script>
</body>
</html>
