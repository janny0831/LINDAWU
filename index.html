<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保管品管理系統 - 完全還原版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .sticky-col { position: sticky; right: 0; background-color: white; z-index: 10; box-shadow: -4px 0 6px -2px rgba(0, 0, 0, 0.05); }
        .sticky-header { position: sticky; top: 0; background-color: #f1f5f9; z-index: 20; }
        .sticky-col-header { position: sticky; right: 0; top: 0; background-color: #f1f5f9; z-index: 30; }
        tr:hover .sticky-col { background-color: #f0f7ff; }
        
        .highlight-row {
            animation: highlight-pulse 2.5s ease-out;
        }
        @keyframes highlight-pulse {
            0% { background-color: #fef08a; }
            80% { background-color: #fef08a; } 
            100% { background-color: transparent; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div class="max-w-[98vw] mx-auto p-4">
        
        <!-- 頂部控制列 -->
        <header class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    大量(管理部)保管品管理系統
                </h1>
                <p class="text-sm text-slate-500 mt-1">支援完整「匯入/匯出」閉環，包含資料清單、歷史日誌與定位功能。</p>
            </div>
            
            <div class="flex flex-wrap justify-center gap-3">
                <input type="file" id="fileUpload" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="fileUpload" class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded-lg transition flex items-center gap-2 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    匯入 Excel (含日誌)
                </label>
                <button onclick="openAddModal()" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium py-2.5 px-4 rounded-lg transition flex items-center gap-2 shadow-sm">
                    新增項目
                </button>
                <button id="exportBtn" onclick="exportToExcel()" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 px-6 rounded-lg transition flex items-center gap-2 shadow-sm hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    匯出清單與日誌
                </button>
            </div>
        </header>

        <!-- 主內容區 -->
        <div id="mainContent" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-200 mb-4 gap-4">
                <div class="flex">
                    <button onclick="switchTab('page1')" id="tab-page1" class="py-3 px-6 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition-colors">資料清單</button>
                    <button onclick="switchTab('page2')" id="tab-page2" class="py-3 px-6 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors">異動日誌</button>
                </div>
                
                <div id="searchContainer" class="w-full md:w-80 pb-2 md:pb-0">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        </span>
                        <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="搜尋品名、單號、保管人..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm">
                    </div>
                </div>
            </div>

            <!-- Page 1: 清單 -->
            <div id="page1" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto max-h-[75vh]">
                    <table class="w-full text-sm text-left whitespace-nowrap">
                        <thead id="tableHead" class="sticky-header"></thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
                <div id="tableFooter" class="p-4 bg-slate-50 border-t border-slate-200 text-slate-500 text-sm font-medium"></div>
            </div>

            <!-- Page 2: 日誌 -->
            <div id="page2" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto max-h-[75vh]">
                    <table class="w-full text-sm text-left whitespace-nowrap">
                        <thead id="logTableHead" class="sticky-header text-slate-600"></thead>
                        <tbody id="logBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 空狀態 -->
        <div id="emptyState" class="flex flex-col items-center justify-center p-24 bg-white rounded-xl shadow-sm border border-slate-200 text-center">
            <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">尚未匯入資料</h3>
            <p class="text-slate-500 max-w-sm mx-auto">請上傳由本系統導出的 Excel 檔案。系統將自動還原清單與完整的異動日誌紀錄。</p>
        </div>
    </div>

    <!-- 編輯 Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl flex flex-col max-h-[95vh]">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-slate-800">資料編輯</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full transition text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <div class="p-8 overflow-y-auto flex-1">
                <form id="editForm" onsubmit="handleFormSubmit(event)">
                    <div id="editFormFields" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-6"></div>
                </form>
            </div>
            <div class="p-6 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
                <button onclick="closeModal()" class="px-6 py-2.5 border border-slate-300 rounded-xl text-slate-700 bg-white hover:bg-slate-50 transition font-bold">取消</button>
                <button type="submit" form="editForm" class="px-10 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition font-bold shadow-md">儲存並更新</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 mb-2">確認刪除項目？</h3>
            <p id="confirmText" class="text-slate-500 mb-8">此操作將無法復原。</p>
            <div class="flex gap-4">
                <button onclick="closeConfirm()" class="flex-1 px-4 py-3 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition font-bold">取消</button>
                <button id="confirmBtn" class="flex-1 px-4 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition font-bold shadow-lg">確認移除</button>
            </div>
        </div>
    </div>

    <script>
        const STANDARD_HEADERS = [
            "是否盤點", "日期", "保管單號碼", "保管品號碼", "品名", "廠牌", "規格", "型式", 
            "取得成本", "保管人", "部門", "存放地點", "備註", 
            "固資轉列管取得日期", "處理結果", "轉出部門", "轉入部門", "取得日期"
        ];
        const DATE_FIELDS = ["日期", "固資轉列管取得日期", "取得日期"];

        const appState = {
            data: [],
            logs: [],
            editUid: null,
            isNew: false
        };

        window.currentSearchTerm = '';

        const escapeHTML = (str) => {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        };

        function parseExcelDate(cell) {
            if (!cell) return "";
            if (cell.w) {
                let formatted = cell.w.split(' ')[0].replace(/-/g, '/');
                if (/\d{4}\/\d{1,2}\/\d{1,2}/.test(formatted)) return formatted;
            }
            const val = cell.v;
            if (typeof val === 'number') {
                const date = new Date(Math.round((val - 25569) * 86400 * 1000));
                if (!isNaN(date.getTime())) {
                    const y = date.getUTCFullYear();
                    const m = String(date.getUTCMonth() + 1).padStart(2, '0');
                    const d = String(date.getUTCDate()).padStart(2, '0');
                    return `${y}/${m}/${d}`;
                }
            }
            const d = new Date(val);
            if (!isNaN(d.getTime())) {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}/${m}/${day}`;
            }
            return String(val).trim();
        }

        /**
         * 核心更新：處理多工作表匯入，還原資料與日誌
         */
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const binary = new Uint8Array(e.target.result);
                const workbook = XLSX.read(binary, { type: 'array' });
                
                // --- 1. 處理保管品清單 ---
                const sheet1Name = workbook.SheetNames.find(n => n.includes("保管品") || n.includes("清單")) || workbook.SheetNames[0];
                const worksheet1 = workbook.Sheets[sheet1Name];
                const listRaw = XLSX.utils.sheet_to_json(worksheet1, { defval: "" });
                
                const importedData = listRaw.map((item, idx) => {
                    const row = {};
                    STANDARD_HEADERS.forEach(h => row[h] = item[h] !== undefined ? String(item[h]).trim() : "");
                    // 賦予一個獨特的內部 ID
                    row._uid = 'uid_' + Date.now() + '_' + idx;
                    return row;
                });

                // --- 2. 處理異動日誌 ---
                const sheet2Name = workbook.SheetNames.find(n => n.includes("日誌"));
                let importedLogs = [];
                if (sheet2Name) {
                    const worksheet2 = workbook.Sheets[sheet2Name];
                    const logsRaw = XLSX.utils.sheet_to_json(worksheet2, { defval: "" });
                    
                    importedLogs = logsRaw.map(l => {
                        const logObj = {
                            time: l["異動時間"] || "",
                            action: l["動作"] || "",
                            target: l["單號對象"] || "",
                            details: l["詳細內容"] || "",
                            uid: null, // 匯入後初始設為空，下一步進行匹配
                            rowData: {}
                        };
                        STANDARD_HEADERS.forEach(h => {
                            logObj.rowData[h] = l[h] || "";
                        });
                        
                        // 智慧匹配：如果日誌中的保管單號能在現有清單中找到，則還原定位功能
                        const match = importedData.find(d => d["保管單號碼"] === logObj.target && logObj.target !== "");
                        if (match) {
                            logObj.uid = match._uid;
                        }
                        return logObj;
                    });
                }

                // 更新全局狀態
                appState.data = importedData;
                appState.logs = importedLogs.reverse(); // 因為 renderLogs 會再 reverse 一次顯示最新

                document.getElementById('searchInput').value = '';
                window.currentSearchTerm = '';
                initSystemView();
            };
            reader.readAsArrayBuffer(file);
            e.target.value = '';
        }

        function initSystemView() {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('exportBtn').classList.remove('hidden');
            renderTable();
            renderLogs();
        }

        function handleSearch(val) {
            window.currentSearchTerm = val.trim();
            renderTable();
        }

        function locateItem(uid) {
            switchTab('page1');
            const searchInput = document.getElementById('searchInput');
            if (searchInput.value !== '') {
                searchInput.value = '';
                window.currentSearchTerm = '';
                renderTable();
            }
            setTimeout(() => {
                const targetRow = document.getElementById(`row-${uid}`);
                if (targetRow) {
                    targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targetRow.classList.remove('highlight-row');
                    void targetRow.offsetWidth;
                    targetRow.classList.add('highlight-row');
                }
            }, 50);
        }

        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            let headHtml = `<tr class="bg-slate-50 text-slate-600 text-xs tracking-wider uppercase">`;
            STANDARD_HEADERS.forEach(h => headHtml += `<th class="px-4 py-4 font-bold border-b border-slate-200">${escapeHTML(h)}</th>`);
            headHtml += `<th class="sticky-col-header px-4 py-4 font-bold text-center w-28 border-b border-slate-200">操作</th></tr>`;
            thead.innerHTML = headHtml;

            let displayData = appState.data;
            if (window.currentSearchTerm) {
                const term = window.currentSearchTerm.toLowerCase();
                displayData = appState.data.filter(row => STANDARD_HEADERS.some(h => String(row[h] || '').toLowerCase().includes(term)));
            }

            let bodyHtml = '';
            displayData.forEach(row => {
                bodyHtml += `<tr id="row-${row._uid}" class="hover:bg-blue-50/40 transition-colors">`;
                STANDARD_HEADERS.forEach(h => {
                    const val = row[h] || "";
                    let display = escapeHTML(val);
                    if (h === "是否盤點") {
                        const style = val === 'Y' ? 'bg-green-100 text-green-700' : (val === 'N' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-400');
                        display = `<span class="px-2 py-0.5 rounded text-[10px] font-black ${style}">${val || 'N'}</span>`;
                    }
                    bodyHtml += `<td class="px-4 py-3 border-b border-slate-100 max-w-[200px] truncate">${display}</td>`;
                });
                bodyHtml += `
                    <td class="sticky-col px-4 py-3 border-b border-slate-100 text-center">
                        <div class="flex justify-center gap-1">
                            <button onclick="openEditModal('${row._uid}')" class="px-2 py-1 text-blue-600 hover:bg-blue-50 rounded-lg text-xs font-bold transition">編輯</button>
                            <button onclick="confirmDelete('${row._uid}')" class="p-1 text-red-400 hover:bg-red-50 rounded-lg transition"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                        </div>
                    </td></tr>`;
            });
            tbody.innerHTML = bodyHtml;
            document.getElementById('tableFooter').innerHTML = window.currentSearchTerm ? `搜尋結果： <strong>${displayData.length}</strong> 筆` : `共計 <strong>${appState.data.length}</strong> 筆`;
        }

        function switchTab(tabId) {
            const active = ['border-blue-600', 'text-blue-600'], inactive = ['border-transparent', 'text-slate-500'];
            document.getElementById('tab-page1').className = `py-3 px-6 text-sm font-bold border-b-2 ${tabId === 'page1' ? active.join(' ') : inactive.join(' ')}`;
            document.getElementById('tab-page2').className = `py-3 px-6 text-sm font-bold border-b-2 ${tabId === 'page2' ? active.join(' ') : inactive.join(' ')}`;
            document.getElementById('page1').classList.toggle('hidden', tabId !== 'page1');
            document.getElementById('page2').classList.toggle('hidden', tabId !== 'page2');
            document.getElementById('searchContainer').classList.toggle('hidden', tabId !== 'page1');
            if (tabId === 'page2') renderLogs();
        }

        function openAddModal() {
            appState.isNew = true; appState.editUid = 'new_' + Date.now();
            document.getElementById('modalTitle').innerText = "新增保管品項目";
            renderForm({}); document.getElementById('editModal').classList.remove('hidden');
        }

        function openEditModal(uid) {
            appState.isNew = false; appState.editUid = uid;
            const row = appState.data.find(d => d._uid === uid);
            document.getElementById('modalTitle').innerText = "編輯欄位內容";
            renderForm(row); document.getElementById('editModal').classList.remove('hidden');
        }

        function renderForm(data) {
            const container = document.getElementById('editFormFields');
            let html = '';
            STANDARD_HEADERS.forEach((h, index) => {
                const val = data[h] || "";
                html += `<div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">${index+1}. ${h}</label>`;
                if (h === "是否盤點") {
                    html += `<select name="${h}" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"><option value="N" ${val === "N" ? "selected" : ""}>N</option><option value="Y" ${val === "Y" ? "selected" : ""}>Y</option></select>`;
                } else if (DATE_FIELDS.includes(h)) {
                    html += `<input type="date" name="${h}" value="${val.replace(/\//g, '-')}" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl">`;
                } else {
                    html += `<input type="text" name="${h}" value="${escapeHTML(val)}" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl">`;
                }
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target), newValues = {}, timestamp = new Date().toLocaleString('zh-TW', { hour12: false });
            STANDARD_HEADERS.forEach(h => {
                let val = formData.get(h);
                if (val && DATE_FIELDS.includes(h)) val = val.replace(/-/g, '/');
                newValues[h] = val || "";
            });

            if (appState.isNew) {
                newValues._uid = appState.editUid;
                appState.data.push(newValues);
                appState.logs.push({ time: timestamp, action: '新增', target: newValues['保管單號碼'] || '手動建立', details: '手動新增資料', uid: newValues._uid, rowData: {...newValues} });
            } else {
                const idx = appState.data.findIndex(d => d._uid === appState.editUid), oldData = appState.data[idx], changes = [];
                STANDARD_HEADERS.forEach(h => { if (oldData[h] !== newValues[h]) changes.push(`[${h}]：${oldData[h]||'空'}➔${newValues[h]||'空'}`); });
                if (changes.length > 0) {
                    appState.data[idx] = { ...newValues, _uid: appState.editUid };
                    appState.logs.push({ time: timestamp, action: '修正', target: oldData['保管單號碼'] || '無單號', details: changes.join('；'), uid: appState.editUid, rowData: {...newValues} });
                }
            }
            renderTable(); closeModal(); if (appState.data.length > 0) initSystemView();
        }

        let pendingDeleteUid = null;
        function confirmDelete(uid) {
            pendingDeleteUid = uid; const row = appState.data.find(d => d._uid === uid);
            document.getElementById('confirmText').innerHTML = `確定刪除單號 <span class="font-bold underline">${row['保管單號碼']}</span>？`;
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        function executeDelete() {
            const row = appState.data.find(d => d._uid === pendingDeleteUid);
            appState.data = appState.data.filter(d => d._uid !== pendingDeleteUid);
            appState.logs.push({ time: new Date().toLocaleString('zh-TW', { hour12: false }), action: '刪除', target: row['保管單號碼'] || '系統', details: `移除：${row['品名']}`, uid: null, rowData: {...row} });
            renderTable(); closeConfirm();
            if (appState.data.length === 0) {
                document.getElementById('mainContent').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }
        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }
        document.getElementById('confirmBtn').onclick = executeDelete;

        function renderLogs() {
            const head = document.getElementById('logTableHead'), body = document.getElementById('logBody');
            let hHtml = `<tr><th class="px-4 py-3 font-bold border-b border-slate-200">異動時間</th><th class="px-4 py-3 font-bold border-b border-slate-200">動作</th><th class="px-4 py-3 font-bold border-b border-slate-200">單號</th><th class="px-4 py-3 font-bold border-b border-slate-200">詳細</th><th class="px-4 py-3 font-bold border-b border-slate-200 text-center">定位</th>`;
            STANDARD_HEADERS.forEach(h => hHtml += `<th class="px-4 py-3 font-bold border-b border-slate-200 text-xs text-slate-400">${escapeHTML(h)}</th>`);
            head.innerHTML = hHtml + `</tr>`;

            if (appState.logs.length === 0) {
                body.innerHTML = `<tr><td colspan="${5 + STANDARD_HEADERS.length}" class="p-12 text-center text-slate-300">無任何變更記錄</td></tr>`;
                return;
            }
            body.innerHTML = [...appState.logs].reverse().map(log => {
                let rHtml = `<tr class="text-xs hover:bg-slate-50"><td class="px-4 py-4 font-mono text-slate-400">${log.time}</td><td class="px-4 py-4"><span class="px-2 py-1 rounded font-bold ${log.action === '刪除' ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'}">${log.action}</span></td><td class="px-4 py-4 font-bold">${escapeHTML(log.target)}</td><td class="px-4 py-4 text-slate-500 truncate max-w-[200px]" title="${escapeHTML(log.details)}">${escapeHTML(log.details)}</td><td class="px-4 py-4 text-center">${log.uid ? `<button onclick="locateItem('${log.uid}')" class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded font-bold">尋找</button>` : '-'}</td>`;
                STANDARD_HEADERS.forEach(h => rHtml += `<td class="px-4 py-4 text-slate-400 truncate max-w-[120px]">${escapeHTML(log.rowData?.[h] || "")}</td>`);
                return rHtml + `</tr>`;
            }).join('');
        }

        function exportToExcel() {
            const listWs = XLSX.utils.json_to_sheet(appState.data.map(({ _uid, ...r }) => r));
            const logWs = XLSX.utils.json_to_sheet(appState.logs.map(l => {
                let o = { "異動時間": l.time, "動作": l.action, "單號對象": l.target, "詳細內容": l.details };
                if (l.rowData) STANDARD_HEADERS.forEach(h => o[h] = l.rowData[h] || "");
                return o;
            }));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, listWs, "保管品清單");
            XLSX.utils.book_append_sheet(wb, logWs, "異動日誌");
            XLSX.writeFile(wb, `保管品系統備份_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    </script>
</body>
</html>
